<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAP · פתיחת ספק במאגר 2026</title>
    <style>
      body {
        margin: 0;
        background: #f3f4f6;
        color: #1f2937;
        font-family: "Heebo", "Segoe UI", Arial, sans-serif;
      }
      header {
        background: #0f6cbd;
        color: white;
        padding: 16px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sap {
        font-weight: 800;
        letter-spacing: 0.08em;
        font-size: 22px;
      }
      main {
        max-width: 920px;
        margin: 28px auto;
        padding: 0 20px;
      }
      .panel {
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      .panel-header {
        border-bottom: 1px solid #e5e7eb;
        padding: 18px 22px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      .subtitle {
        color: #6b7280;
        margin-top: 6px;
        font-size: 14px;
      }
      form {
        padding: 22px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        padding: 9px 10px;
        font: inherit;
        background: white;
      }
      textarea {
        min-height: 88px;
        resize: vertical;
      }
      .full {
        grid-column: 1 / -1;
      }
      .actions {
        border-top: 1px solid #e5e7eb;
        margin-top: 22px;
        padding-top: 18px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      button {
        border: 0;
        border-radius: 4px;
        padding: 9px 16px;
        font: inherit;
        cursor: pointer;
      }
      .primary {
        background: #0f6cbd;
        color: white;
      }
      .secondary {
        background: #e5e7eb;
        color: #111827;
      }
      .note {
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1e40af;
        padding: 12px 14px;
        border-radius: 4px;
        font-size: 14px;
        margin-bottom: 18px;
      }
      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="sap">SAP</div>
      <div>קרן רש"י · מאגר ספקים 2026</div>
    </header>
    <main>
      <section class="panel">
        <div class="panel-header">
          <h1>פתיחת ספק חדש במאגר</h1>
          <div class="subtitle">
            דף דמה לצורכי POC. בהמשך יוחלף בקישור לטופס SAP / SuccessFactors האמיתי.
          </div>
        </div>
        <form>
          <div class="note">
            מלאו את פרטי הספק וצירפו מסמכים בסיסיים: אישור ניהול ספרים, אישור ניכוי מס במקור, פרטי חשבון בנק ואיש קשר.
          </div>
          <div class="grid">
            <div>
              <label for="supplier-name">שם ספק</label>
              <input id="supplier-name" placeholder="לדוגמה: א.ב. שירותים בע״מ" />
            </div>
            <div>
              <label for="tax-id">ח.פ / עוסק מורשה</label>
              <input id="tax-id" dir="ltr" placeholder="512345678" />
            </div>
            <div>
              <label for="category">קטגוריית שירות</label>
              <select id="category">
                <option>בחרו קטגוריה...</option>
                <option>ייעוץ מקצועי</option>
                <option>הדרכה וחינוך</option>
                <option>קייטרינג ואירוח</option>
                <option>ציוד ושירותים טכניים</option>
                <option>פעילות שטח / ODT</option>
              </select>
            </div>
            <div>
              <label for="contact">איש קשר</label>
              <input id="contact" placeholder="שם מלא" />
            </div>
            <div>
              <label for="email">אימייל</label>
              <input id="email" dir="ltr" placeholder="supplier@example.com" />
            </div>
            <div>
              <label for="phone">טלפון</label>
              <input id="phone" dir="ltr" placeholder="050-0000000" />
            </div>
            <div class="full">
              <label for="notes">הערות לרישום</label>
              <textarea id="notes" placeholder="מידע נוסף על השירות, דחיפות, או הקשר לקרן רש״י"></textarea>
            </div>
          </div>
          <div class="actions">
            <button type="button" class="secondary">שמירה כטיוטה</button>
            <button type="button" class="primary">שליחה לאישור ספקים</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
